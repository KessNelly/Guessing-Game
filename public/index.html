<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuessMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .chat-scroll { max-height: 420px; overflow-y: auto; scroll-behavior: smooth; }
        .message { animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-950 text-white">
    <div class="max-w-6xl mx-auto p-4">
        <h1 class="text-5xl font-bold text-center mb-8 text-emerald-400 tracking-tight">🎯 GuessMaster</h1>
        
        <!-- Lobby Screen -->
        <div id="lobby" class="space-y-6 max-w-md mx-auto">
            <div class="flex gap-4">
                <input id="username" type="text" placeholder="Your username" 
                       class="bg-gray-800 border border-gray-700 rounded-xl px-5 py-4 flex-1 focus:outline-none focus:border-emerald-500 text-lg">
                <button onclick="createSession()" 
                        class="bg-emerald-600 hover:bg-emerald-700 px-10 py-4 rounded-xl font-semibold whitespace-nowrap">
                    Create Game
                </button>
            </div>
            
            <div class="flex gap-4">
                <input id="joinCode" type="text" placeholder="ROOM CODE" maxlength="6"
                       class="bg-gray-800 border border-gray-700 rounded-xl px-5 py-4 flex-1 focus:outline-none focus:border-blue-500 text-lg uppercase tracking-widest">
                <button onclick="joinSession()" 
                        class="bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-xl font-semibold whitespace-nowrap">
                    Join Game
                </button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game" class="hidden">
            <div class="flex flex-col lg:flex-row gap-6">
                <!-- Players Sidebar -->
                <div class="w-full lg:w-72 bg-gray-900 rounded-3xl p-5">
                    <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                        👥 Players <span id="playerCount" class="text-emerald-400 text-sm font-normal"></span>
                    </h3>
                    <div id="playersList" class="space-y-3"></div>
                    <div id="gmStatus" class="mt-6 text-emerald-400 font-medium text-center"></div>
                </div>

                <!-- Main Game Area -->
                <div class="flex-1 bg-gray-900 rounded-3xl p-6">
                    <div id="status" class="text-center text-2xl font-semibold mb-6 min-h-[2.5rem]"></div>
                    
                    <!-- Question -->
                    <div id="questionArea" class="hidden bg-gray-800 rounded-2xl p-8 mb-8">
                        <div id="questionText" class="text-2xl leading-relaxed mb-8 text-gray-100"></div>
                        <div class="flex gap-3">
                            <input id="guessInput" type="text" placeholder="Type your guess..." 
                                   class="bg-gray-700 border border-gray-600 rounded-2xl px-6 py-4 flex-1 focus:outline-none focus:border-emerald-500 text-lg">
                            <button onclick="submitGuess()" 
                                    class="bg-emerald-600 hover:bg-emerald-700 px-10 rounded-2xl font-semibold">
                                Guess
                            </button>
                        </div>
                        <div id="attempts" class="text-sm text-gray-400 mt-3 text-center"></div>
                    </div>

                    <!-- Timer -->
                    <div id="timer" class="hidden text-center text-6xl font-mono font-bold text-orange-400 mb-8"></div>

                    <!-- Game Log -->
                    <div class="bg-gray-800 rounded-2xl p-5">
                        <h4 class="font-semibold mb-4 text-gray-300">Game Log</h4>
                        <div id="chat" class="chat-scroll h-80 overflow-y-auto space-y-3 pr-2"></div>
                    </div>
                </div>
            </div>

            <!-- GM Controls -->
            <div id="gmControls" class="hidden mt-8 flex flex-wrap gap-4 justify-center">
                <button onclick="showCreateQuestion()" 
                        class="bg-indigo-600 hover:bg-indigo-700 px-8 py-4 rounded-2xl font-semibold">
                        Create Question
                </button>
                <button onclick="startGame()" 
                        class="bg-purple-600 hover:bg-purple-700 px-8 py-4 rounded-2xl font-semibold">
                        Start Round
                </button>
            </div>
        </div>
    </div>

    <script>
   let socket = null;
    let currentSessionId = null;
    let isGameMaster = false;
    let currentUsername = '';
    let attemptsUsed = 0;
    let currentRoundActive = false;

    function initSocket() {
        if (socket) socket.disconnect();
        socket = io('https://guessing-game-s9w1.onrender.com');
       // socket = io();

        socket.on('connect', () => addSystemMessage('Connected'));
        socket.on('disconnect', () => addSystemMessage('Disconnected'));

        socket.on('sessionCreated', (data) => {
            currentSessionId = data.sessionId;
            isGameMaster = true;
            switchToGameScreen();
            updatePlayers(data.players);
            addSystemMessage(`Room: <strong>${currentSessionId}</strong> (Share this code!)`);
            updateGMControls();
        });

        socket.on('sessionJoined', (data) => {
            currentSessionId = data.sessionId;
            isGameMaster = data.role === 'gamemaster';
            switchToGameScreen();
            updatePlayers(data.players);
            addSystemMessage(`Joined room ${currentSessionId}`);
            updateGMControls();
        });

        socket.on('playerJoined', (data) => {
            updatePlayers(data.players);
            if (data.message) addSystemMessage(data.message);
        });

        socket.on('playerLeft', (data) => {
            updatePlayers(data.players);
            if (data.message) addSystemMessage(data.message);
        });

        socket.on('questionCreated', (data) => {
            document.getElementById('questionText').textContent = data.question;
            document.getElementById('questionArea').classList.remove('hidden');
            addSystemMessage('Question posted by GM');
        });

        socket.on('gameStarted', () => {
            currentRoundActive = true;
            attemptsUsed = 0;
            updateAttemptsDisplay();
            document.getElementById('timer').classList.remove('hidden');
            addSystemMessage('🚀 Round started!');
        });

        socket.on('timerUpdate', (data) => {
            document.getElementById('timer').textContent = `⏱ ${data.timeLeft}s`;
        });

        socket.on('guessResult', (data) => {
            if (data.correct) {
                addSystemMessage(`Correct answer! You have won`);
            } else {
                attemptsUsed = data.attemptsUsed;
                updateAttemptsDisplay();
                addSystemMessage(`Wrong guess. ${3 - attemptsUsed} attempts remaining`);
            }
        });

        socket.on('roundEnded', (data) => {
            currentRoundActive = false;
            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('timer').classList.add('hidden');
            if (data.hasWinner && data.winner) {
                addSystemMessage(`🏆 ${data.winner.username} WINS +10 points!`);
            } else {
                addSystemMessage(`Time's up! Answer: <strong>${data.answer}</strong>`);
            }
            updatePlayers(data.players);
        });

        socket.on('nextRoundReady', (data) => {
            isGameMaster = data.newGameMaster === currentUsername;
            updateGMControls();
            addSystemMessage(`New GM: ${data.newGameMaster}`);
        });

        socket.on('error', (err) => alert(err.message || 'Error'));
    }

    function createSession() {
        currentUsername = document.getElementById('username').value.trim();
        if (!currentUsername) return alert('Enter username');
        initSocket();
        socket.emit('createSession', { username: currentUsername });
    }

    function joinSession() {
        currentUsername = document.getElementById('username').value.trim();
        const code = document.getElementById('joinCode').value.trim().toUpperCase();
        if (!currentUsername || !code) return alert('Username and code required');
        initSocket();
        socket.emit('joinSession', { sessionId: code, username: currentUsername });
    }

    function switchToGameScreen() {
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
    }

    function updatePlayers(players) {
        const container = document.getElementById('playersList');
        let html = '';
        players.forEach(p => {
            const isMe = p.username === currentUsername;
            html += `
                <div class="flex justify-between bg-gray-800 px-5 py-3 rounded-2xl ${isMe ? 'ring-2 ring-emerald-500' : ''}">
                    <span>${p.username} ${p.role === 'gamemaster' ? '👑' : ''}</span>
                    <span class="font-mono">${p.score} pts</span>
                </div>`;
        });
        container.innerHTML = html;
        document.getElementById('playerCount').textContent = `(${players.length})`;
    }

    function updateGMControls() {
        document.getElementById('gmStatus').textContent = isGameMaster ? '👑 You are Game Master' : '';
        document.getElementById('gmControls').classList.toggle('hidden', !isGameMaster);
    }

    function updateAttemptsDisplay() {
        document.getElementById('attempts').textContent = `Attempts: ${attemptsUsed}/3`;
    }

    function showCreateQuestion() {
        if (!isGameMaster) return;
        const q = prompt("Enter question:");
        const a = prompt("Enter correct answer:");
        if (q && a) socket.emit('createQuestion', { sessionId: currentSessionId, question: q, answer: a });
    }

    function startGame() {
        if (currentSessionId) socket.emit('startGame', { sessionId: currentSessionId });
    }

    function submitGuess() {
        const input = document.getElementById('guessInput');
        const guess = input.value.trim();
        if (guess && currentSessionId) {
            socket.emit('submitGuess', { sessionId: currentSessionId, guess });
            input.value = '';
        }
    }

    function addSystemMessage(text) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'message text-emerald-400 italic py-1';
        div.innerHTML = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    window.addEventListener('beforeunload', () => {
        if (socket) socket.emit('leaveSession');
    });
</script>
</body>
</html>
